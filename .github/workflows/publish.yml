name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4'

      - name: Publish all versions to Maven
        run: |
          chmod +x ./gradlew
          ./gradlew publishAllMaven --stacktrace
        env:
          axleMavenUsername: ${{ secrets.MAVEN_USERNAME }}
          axleMavenPassword: ${{ secrets.MAVEN_SECRET }}
